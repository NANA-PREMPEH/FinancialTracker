{% extends "base.html" %}

{% block title %}Add Project - Financial Tracker{% endblock %}
{% block header_title %}Add New Project{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-surface rounded-2xl border border-border shadow-sm overflow-hidden text-text">
        <div class="p-6 border-b border-border bg-surface-active/30 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                <i data-lucide="folder-plus" class="w-5 h-5"></i>
            </div>
            <h2 class="text-xl font-bold font-heading m-0 text-text">Project Details</h2>
        </div>

        <div class="p-6 sm:p-8">
            <form method="POST" class="space-y-6">
                
                <div class="space-y-2">
                    <label for="name" class="block text-sm font-semibold text-text">Project Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g., Wedding Planning, Home Renovation" required autofocus
                        class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium">
                </div>

                <div class="space-y-2">
                    <label for="description" class="block text-sm font-semibold text-text">Description (Optional)</label>
                    <textarea id="description" name="description" rows="3" placeholder="Add details about your project..."
                        class="w-full p-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none"></textarea>
                </div>

                <div class="space-y-2">
                    <label for="funding_source" class="block text-sm font-semibold text-text">Source of Funding</label>
                    <select id="funding_source" name="funding_source" onchange="toggleFundingOptions()" required
                        class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%2364748b\'%3E%3Cpath stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M19 9l-7 7-7-7\'/%3E%3C/svg%3E'); background-size: 1.25rem;">
                        <option value="" disabled selected>Select funding source...</option>
                        <option value="ticket_sales">Ticket Sales/Registration Fees</option>
                        <option value="sponsorships">Sponsorships/Donations/Grants</option>
                        <option value="merchandise">Merchandise Sales/Vendor Fees</option>
                        <option value="company_funding">Company/Institutional Funding</option>
                        <option value="wallet">From Wallet</option>
                        <option value="other">Other (Custom)</option>
                    </select>
                </div>

                <!-- Wallet Selection (shown when "From Wallet" is selected) -->
                <div class="space-y-2 hidden animate-fade-in" id="wallet_selection">
                    <label for="wallet_id" class="block text-sm font-semibold text-text flex items-center gap-2">
                        <i data-lucide="wallet" class="w-4 h-4 text-primary"></i> Select Wallet
                    </label>
                    <select id="wallet_id" name="wallet_id"
                        class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%2364748b\'%3E%3Cpath stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M19 9l-7 7-7-7\'/%3E%3C/svg%3E'); background-size: 1.25rem;">
                        <option value="" disabled selected>Choose a wallet...</option>
                        {% for wallet in wallets %}
                        <option value="{{ wallet.id }}">{{ wallet.icon }} {{ wallet.name }} ({{ wallet.currency }} {{ "{:,.2f}".format(wallet.balance) }})</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Custom Funding Source (shown when "Other" is selected) -->
                <div class="space-y-2 hidden animate-fade-in" id="custom_funding">
                    <label for="custom_funding_source" class="block text-sm font-semibold text-text">Custom Funding Source</label>
                    <input type="text" id="custom_funding_source" name="custom_funding_source" placeholder="Enter custom funding source"
                        class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium">
                </div>

                <div class="pt-6 border-t border-border flex flex-col sm:flex-row gap-4 mt-8">
                    <button type="submit" class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3.5 bg-primary text-primary-content font-bold rounded-xl hover:bg-primary-hover transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50 text-lg">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> Create Project
                    </button>
                    <a href="{{ url_for('main.projects') }}" class="sm:flex-none inline-flex items-center justify-center px-8 py-3.5 bg-surface border border-border text-text font-bold rounded-xl hover:bg-surface-hover transition-colors focus:outline-none focus:ring-2 focus:ring-border text-lg">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function toggleFundingOptions() {
    const fundingSource = document.getElementById('funding_source').value;
    const walletSelection = document.getElementById('wallet_selection');
    const customFunding = document.getElementById('custom_funding');
    const walletSelect = document.getElementById('wallet_id');
    const customInput = document.getElementById('custom_funding_source');

    // Hide all conditional fields
    walletSelection.style.display = 'none';
    walletSelection.classList.add('hidden');
    customFunding.style.display = 'none';
    customFunding.classList.add('hidden');
    
    // Remove required attributes
    walletSelect.removeAttribute('required');
    customInput.removeAttribute('required');

    // Show relevant field based on selection
    if (fundingSource === 'wallet') {
        walletSelection.style.display = 'block';
        walletSelection.classList.remove('hidden');
        walletSelect.setAttribute('required', 'required');
    } else if (fundingSource === 'other') {
        customFunding.style.display = 'block';
        customFunding.classList.remove('hidden');
        customInput.setAttribute('required', 'required');
    }
}

// Initialize on load
document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
    toggleFundingOptions();
});
</script>
{% endblock %}
