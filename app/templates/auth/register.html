<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Financial Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (savedTheme === 'dark' || (!savedTheme && systemTheme === 'dark')) {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i data-lucide="calculator"></i>
                    <h1>FinTracker</h1>
                </div>
                <p>Create your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" style="margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: var(--radius-md); background: var(--color-surface); border-left: 4px solid var(--color-{{ 'primary' if category == 'message' else 'error' if category == 'error' else category }});">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">
                        <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                        Full Name
                    </label>
                    <input type="text" id="name" name="name" required placeholder="John Doe" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">
                        <i data-lucide="mail" style="width: 16px; height: 16px;"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i data-lucide="lock" style="width: 16px; height: 16px;"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Min. 6 characters" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">
                        <i data-lucide="shield-check" style="width: 16px; height: 16px;"></i>
                        Confirm Password
                    </label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter your password" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                    <i data-lucide="user-plus" style="width: 18px; height: 18px;"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
