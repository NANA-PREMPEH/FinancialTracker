{% extends "base.html" %}

{% block title %}Add Recurring Transaction - Financial Tracker{% endblock %}
{% block header_title %}Add Recurring Transaction{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-surface rounded-2xl border border-border shadow-sm overflow-hidden text-text">
        <div class="p-6 border-b border-border bg-surface-active/30 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </div>
            <h2 class="text-xl font-bold font-heading m-0 text-text">Recurring Details</h2>
        </div>

        <div class="p-6 sm:p-8">
            <form method="POST" class="space-y-6">
                
                <div class="space-y-3">
                    <label class="block text-sm font-semibold text-text">Transaction Type</label>
                    <div class="flex gap-4">
                        <label class="flex-1 relative">
                            <input type="radio" name="transaction_type" value="expense" checked class="peer sr-only" id="type_expense">
                            <div class="w-full p-4 rounded-xl border-2 border-border bg-surface peer-checked:border-danger peer-checked:bg-danger/5 cursor-pointer flex flex-col items-center justify-center gap-2 transition-all hover:border-danger/50 group">
                                <div class="w-10 h-10 rounded-full bg-danger/10 text-danger flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="arrow-down-right" class="w-5 h-5"></i>
                                </div>
                                <span class="font-bold text-text peer-checked:text-danger">Expense</span>
                            </div>
                        </label>
                        
                        <label class="flex-1 relative">
                            <input type="radio" name="transaction_type" value="income" class="peer sr-only" id="type_income">
                            <div class="w-full p-4 rounded-xl border-2 border-border bg-surface peer-checked:border-success peer-checked:bg-success/5 cursor-pointer flex flex-col items-center justify-center gap-2 transition-all hover:border-success/50 group">
                                <div class="w-10 h-10 rounded-full bg-success/10 text-success flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                                </div>
                                <span class="font-bold text-text peer-checked:text-success">Income</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="amount" class="block text-sm font-semibold text-text">Amount</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted font-bold">GHS</span>
                            <input type="number" id="amount" name="amount" step="0.01" min="0.01" required placeholder="0.00"
                                class="w-full h-12 pl-12 pr-4 bg-surface border border-border rounded-xl text-text font-bold text-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="start_date" class="block text-sm font-semibold text-text">Start Date</label>
                        <div class="relative">
                            <input type="date" id="start_date" name="start_date" required
                                class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text font-medium focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="description" class="block text-sm font-semibold text-text">Description</label>
                    <input type="text" id="description" name="description" placeholder="e.g., Netflix Subscription, Rent" required
                        class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label for="frequency" class="block text-sm font-semibold text-text">Frequency</label>
                        <select id="frequency" name="frequency" required
                            class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%2364748b\'%3E%3Cpath stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M19 9l-7 7-7-7\'/%3E%3C/svg%3E'); background-size: 1.25rem;">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly" selected>Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label for="category" class="block text-sm font-semibold text-text">Category</label>
                        <select id="category" name="category" required
                            class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%2364748b\'%3E%3Cpath stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M19 9l-7 7-7-7\'/%3E%3C/svg%3E'); background-size: 1.25rem;">
                            {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.icon }} {{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label for="wallet" class="block text-sm font-semibold text-text">Wallet</label>
                        <select id="wallet" name="wallet" required
                            class="w-full h-12 px-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-medium appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%2364748b\'%3E%3Cpath stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M19 9l-7 7-7-7\'/%3E%3C/svg%3E'); background-size: 1.25rem;">
                            {% for wallet in wallets %}
                                <option value="{{ wallet.id }}">{{ wallet.icon }} {{ wallet.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="notes" class="block text-sm font-semibold text-text">Notes (Optional)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Add any extra details here..."
                        class="w-full p-4 bg-surface border border-border rounded-xl text-text focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none"></textarea>
                </div>

                <div class="pt-6 border-t border-border flex flex-col sm:flex-row gap-4 mt-8">
                    <button type="submit" class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3.5 bg-primary text-primary-content font-bold rounded-xl hover:bg-primary-hover transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50 text-lg">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> Create Recurring Transaction
                    </button>
                    <a href="{{ url_for('main.recurring') }}" class="sm:flex-none inline-flex items-center justify-center px-8 py-3.5 bg-surface border border-border text-text font-bold rounded-xl hover:bg-surface-hover transition-colors focus:outline-none focus:ring-2 focus:ring-border text-lg">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        
        // Auto-set start date to today if empty
        const dateInput = document.getElementById('start_date');
        if (!dateInput.value) {
            dateInput.valueAsDate = new Date();
        }
    });
</script>
{% endblock %}
