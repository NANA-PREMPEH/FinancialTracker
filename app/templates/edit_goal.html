{% extends "base.html" %}

{% block title %}Edit Goal - Financial Tracker{% endblock %}
{% block header_title %}Edit Goal{% endblock %}

{% block content %}
<div class="bg-surface rounded-2xl p-6 md:p-8 border border-border shadow-sm max-w-2xl mx-auto mb-8">
    <div class="flex items-center gap-3 mb-8 pb-4 border-b border-border">
        <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary">
            <i data-lucide="edit" class="w-6 h-6"></i>
        </div>
        <div>
            <h2 class="m-0 text-xl font-bold font-heading text-text">Edit Goal: {{ goal.name }}</h2>
            <p class="text-text-muted text-sm mt-1">Update your financial milestone priorities</p>
        </div>
    </div>

    <form method="POST" action="{{ url_for('goals.edit_goal', id=goal.id) }}" class="space-y-6">
        <div class="space-y-2">
            <label for="name" class="block text-sm font-medium text-text-muted">Goal Name</label>
            <input type="text" id="name" name="name" value="{{ goal.name }}" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label for="target_amount" class="block text-sm font-medium text-text-muted">Target Amount (GHS)</label>
                <input type="number" id="target_amount" name="target_amount" step="0.01" min="0.01" value="{{ goal.target_amount }}" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm text-lg font-bold">
            </div>
            <div class="space-y-2">
                <label for="current_amount" class="block text-sm font-medium text-text-muted">Current Amount (GHS)</label>
                <input type="number" id="current_amount" name="current_amount" step="0.01" value="{{ goal.current_amount }}" class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm text-lg font-bold text-success">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label for="goal_type" class="block text-sm font-medium text-text-muted">Goal Type</label>
                <div class="relative">
                    <select id="goal_type" name="goal_type" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-sm cursor-pointer">
                        {% for t in ['Emergency Fund', 'Vacation', 'House Down Payment', 'Retirement', 'Education', 'Car Purchase', 'Debt Payoff', 'Custom'] %}
                        <option value="{{ t }}" {% if goal.goal_type == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text-muted">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
            <div class="space-y-2">
                <label for="deadline" class="block text-sm font-medium text-text-muted">Deadline (Optional)</label>
                <input type="date" id="deadline" name="deadline" value="{{ goal.deadline.strftime('%Y-%m-%d') if goal.deadline else '' }}" class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm cursor-pointer">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label for="icon" class="block text-sm font-medium text-text-muted">Icon (emoji)</label>
                <input type="text" id="icon" name="icon" value="{{ goal.icon or '' }}" maxlength="4" class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm text-xl text-center">
            </div>
            <div class="space-y-2">
                <label for="color" class="block text-sm font-medium text-text-muted">Theme Color</label>
                <div class="flex items-center gap-3">
                    <input type="color" id="color" name="color" value="{{ goal.color or '#6366f1' }}" class="h-12 w-full max-w-[100px] p-1 bg-surface border border-border rounded-xl cursor-pointer">
                    <span class="text-xs text-text-muted">Select a color to personalize this goal</span>
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <label for="notes" class="block text-sm font-medium text-text-muted">Notes (Optional)</label>
            <textarea id="notes" name="notes" rows="3" class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm resize-y">{{ goal.notes or '' }}</textarea>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-border mt-8">
            <button type="submit" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary text-white font-medium rounded-xl hover:bg-primary-hover transition-colors shadow-md flex-1">
                <i data-lucide="save" class="w-4 h-4"></i> Update Goal
            </button>
            <a href="{{ url_for('goals.goals') }}" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-surface text-text border border-border font-medium rounded-xl hover:bg-surface-hover transition-colors shadow-sm sm:w-auto w-full">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
