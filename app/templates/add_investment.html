{% extends "base.html" %}

{% block title %}Add Investment - Financial Tracker{% endblock %}
{% block header_title %}Add Investment{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-surface rounded-2xl p-6 md:p-8 border border-border shadow-sm mb-6">
        <div class="flex items-center gap-4 mb-8 pb-4 border-b border-border">
            <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary shrink-0">
                <i data-lucide="trending-up" class="w-6 h-6"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-text m-0">New Investment</h2>
                <p class="text-text-muted mt-1 text-sm">Add a new asset to your portfolio</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('investments.add_investment') }}" class="space-y-6">
            <div class="space-y-2">
                <label for="name" class="block text-sm font-medium text-text-muted">Investment Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g., Apple Inc. Stock"
                    class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm">
            </div>

            <div class="space-y-2">
                <label for="investment_type" class="block text-sm font-medium text-text-muted">Investment Type</label>
                <div class="relative">
                    <select id="investment_type" name="investment_type" required
                        class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-sm cursor-pointer">
                        <option value="Stocks">Stocks</option>
                        <option value="Bonds">Bonds</option>
                        <option value="Mutual Fund">Mutual Fund</option>
                        <option value="ETF">ETF</option>
                        <option value="Real Estate">Real Estate</option>
                        <option value="Cryptocurrency">Cryptocurrency</option>
                        <option value="Fixed Deposit">Fixed Deposit</option>
                        <option value="Treasury Bill">Treasury Bill</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text-muted">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="amount_invested" class="block text-sm font-medium text-text-muted">Amount Invested (GHS)</label>
                    <input type="number" id="amount_invested" name="amount_invested" step="0.01" min="0.01" required
                        class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm font-bold">
                </div>
                <div class="space-y-2">
                    <label for="current_value" class="block text-sm font-medium text-text-muted">Current Value (GHS)</label>
                    <input type="number" id="current_value" name="current_value" step="0.01" min="0" required
                        class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm font-bold">
                </div>
            </div>

            <div class="space-y-2">
                <label for="purchase_date" class="block text-sm font-medium text-text-muted">Purchase Date</label>
                <input type="date" id="purchase_date" name="purchase_date"
                    class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm cursor-pointer">
            </div>

            <div class="space-y-2">
                <label for="platform" class="block text-sm font-medium text-text-muted">Platform / Broker</label>
                <input type="text" id="platform" name="platform" placeholder="e.g., Fidelity, Robinhood, MTN MoMo"
                    class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm">
            </div>

            <div class="space-y-2">
                <label for="notes" class="block text-sm font-medium text-text-muted">Notes</label>
                <textarea id="notes" name="notes" rows="3" placeholder="Additional details..."
                    class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm resize-y"></textarea>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-border mt-8">
                <button type="submit" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary text-white font-medium rounded-xl hover:bg-primary-hover transition-colors shadow-md flex-1">
                    <i data-lucide="plus" class="w-5 h-5"></i> Add Investment
                </button>
                <a href="{{ url_for('investments.investments') }}" class="inline-flex items-center justify-center px-6 py-3 bg-surface text-text border border-border font-medium rounded-xl hover:bg-surface-hover transition-colors shadow-sm sm:w-auto w-full">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
