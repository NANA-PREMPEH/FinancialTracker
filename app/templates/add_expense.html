{% extends "base.html" %}

{% block title %}Add Expense - Financial Tracker{% endblock %}

{% block header_title %}Add Transaction{% endblock %}

{% block content %}
<div class="bg-surface rounded-2xl p-6 md:p-8 border border-border shadow-sm max-w-2xl mx-auto mb-8">
    <form method="POST" action="{{ url_for('main.add_expense') }}" enctype="multipart/form-data">

        <!-- Date with Quick Selection -->
        <div class="mb-6">
            <label for="date" class="block text-sm font-medium text-text-muted mb-2">Date</label>
            <div class="flex flex-wrap items-center gap-2 mb-3">
                <button type="button" class="px-3 py-1.5 text-xs font-medium bg-surface text-text rounded-lg border border-border hover:bg-surface-hover transition-colors shadow-sm" onclick="setToday()">Today</button>
                <button type="button" class="px-3 py-1.5 text-xs font-medium bg-surface text-text rounded-lg border border-border hover:bg-surface-hover transition-colors shadow-sm" onclick="setYesterday()">Yesterday</button>
                <button type="button" id="lock-date-btn" class="px-3 py-1.5 text-xs font-medium bg-surface text-text rounded-lg border border-border hover:bg-surface-hover transition-colors shadow-sm flex items-center gap-1" onclick="lockDate()" title="Lock this date for multiple entries">
                    <i data-lucide="lock" class="w-3 h-3"></i> Lock
                </button>
                <span id="locked-date-container" style="display: none;"></span>
            </div>
            <input type="date" id="date" name="date" value="{{ now_date }}" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm">
        </div>

        <!-- Transaction Type Toggle -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-text-muted mb-2">Transaction Type</label>
            <div class="flex p-1 bg-surface-hover rounded-xl border border-border shadow-sm relative">
                <div class="flex-1">
                    <input type="radio" id="type_expense" name="transaction_type" value="expense" checked class="peer sr-only">
                    <label for="type_expense" class="block w-full text-center py-2.5 text-sm font-bold text-text-muted rounded-lg cursor-pointer transition-all peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-md relative z-10">Expenses</label>
                </div>
                
                <div class="flex-1">
                    <input type="radio" id="type_income" name="transaction_type" value="income" class="peer sr-only">
                    <label for="type_income" class="block w-full text-center py-2.5 text-sm font-bold text-text-muted rounded-lg cursor-pointer transition-all peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-md relative z-10">Income</label>
                </div>
                
                <div class="flex-1">
                    <input type="radio" id="type_transfer" name="transaction_type" value="transfer" class="peer sr-only">
                    <label for="type_transfer" class="block w-full text-center py-2.5 text-sm font-bold text-text-muted rounded-lg cursor-pointer transition-all peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-md relative z-10">Transfer</label>
                </div>
            </div>
        </div>

        <!-- Amount and Currency -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-6">
            <div class="sm:col-span-2">
                <label for="amount" class="block text-sm font-medium text-text-muted mb-2">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm text-lg font-bold">
            </div>
            <div>
                <label for="currency" class="block text-sm font-medium text-text-muted mb-2">Currency</label>
                <div class="relative">
                    <select id="currency" name="currency" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-sm cursor-pointer">
                        <option value="GHS">GHS</option>
                        {% for code, name in currencies.items() %}
                            <option value="{{ code }}">{{ code }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text-muted">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Description -->
        <div class="mb-6">
            <label for="description" class="block text-sm font-medium text-text-muted mb-2">Description</label>
            <input type="text" id="description" name="description" placeholder="e.g., Lunch at restaurant" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm">
        </div>

        <!-- Category -->
        <div id="category-section" class="mb-6">
            <label class="block text-sm font-medium text-text-muted mb-2">Category</label>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 max-h-60 overflow-y-auto p-1 scrollbar-thin">
                {% for category in categories %}
                <div>
                    <input type="radio" id="cat_{{ category.id }}" name="category" value="{{ category.id }}" {% if loop.first %}checked{% endif %} class="peer sr-only">
                    <label for="cat_{{ category.id }}" class="flex flex-col items-center justify-center p-3 rounded-xl border border-border bg-surface shadow-sm cursor-pointer transition-all hover:bg-surface-hover peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary h-full relative z-10">
                        <span class="text-2xl mb-1">{{ category.icon }}</span>
                        <span class="text-xs font-medium text-text text-center">{{ category.name }}</span>
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Wallet Selection -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
            <div>
                <label id="wallet-label" for="wallet" class="block text-sm font-medium text-text-muted mb-2">Wallet</label>
                <div class="relative">
                    <select id="wallet" name="wallet" required class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-sm cursor-pointer">
                        {% for wallet in wallets %}
                        <option value="{{ wallet.id }}" {% if loop.first %}selected{% endif %}>
                            {{ wallet.name }} ({{ wallet.currency }} {{ "{:,.2f}".format(wallet.balance) }})
                        </option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text-muted">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <div id="to-wallet-section" style="display: none;">
                <label for="to_wallet" class="block text-sm font-medium text-text-muted mb-2">To Wallet</label>
                <div class="relative">
                    <select id="to_wallet" name="to_wallet" class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-sm cursor-pointer">
                        {% for wallet in wallets %}
                        <option value="{{ wallet.id }}">
                            {{ wallet.name }} ({{ wallet.currency }} {{ "{:,.2f}".format(wallet.balance) }})
                        </option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text-muted">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div class="mb-6">
            <label for="notes" class="block text-sm font-medium text-text-muted mb-2">Notes (Optional)</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Add additional details..." class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm resize-y"></textarea>
        </div>

        <!-- Tags/Labels -->
        <div class="mb-6">
            <label for="tags" class="block text-sm font-medium text-text-muted mb-2">Labels (Optional)</label>
            <input type="text" id="tags" name="tags" placeholder="e.g., ProviderFee, ServiceFee, Parking" class="w-full px-4 py-3 bg-surface text-text border border-border rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm mb-2">
            <p class="text-xs text-text-muted"><i data-lucide="info" class="w-3 h-3 inline-block mr-1 align-text-bottom"></i>Separate multiple labels with commas</p>
        </div>

        <!-- Receipt Upload -->
        <div class="mb-8">
            <label for="receipt" class="block text-sm font-medium text-text-muted mb-2">Receipt Photo (Optional)</label>
            <div class="flex items-center justify-center w-full">
                <label for="receipt" class="flex flex-col items-center justify-center w-full h-32 border-2 border-border border-dashed rounded-xl cursor-pointer bg-surface hover:bg-surface-hover transition-colors shadow-sm">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <i data-lucide="upload-cloud" class="w-8 h-8 text-text-muted mb-2"></i>
                        <p class="mb-1 text-sm text-text-muted"><span class="font-semibold text-text">Click to upload</span> or drag and drop</p>
                        <p class="text-xs text-text-muted">SVG, PNG, JPG or GIF</p>
                    </div>
                    <input id="receipt" name="receipt" type="file" accept="image/*" class="hidden" onchange="document.getElementById('receipt-file-name').textContent = this.files[0] ? this.files[0].name : ''; document.getElementById('receipt-file-name').classList.remove('hidden');" />
                </label>
            </div>
            <p id="receipt-file-name" class="text-sm text-primary mt-2 hidden text-center font-medium"></p>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mt-8">
            <button type="submit" name="action" value="save" class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary text-white font-medium rounded-xl hover:bg-primary-hover transition-colors shadow-md">
                <i data-lucide="save" class="w-4 h-4"></i> Save Transaction
            </button>
            <button type="submit" name="action" value="save_and_continue" class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3 bg-surface text-text border border-border font-medium rounded-xl hover:bg-surface-hover transition-colors shadow-sm">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> Save & Continue
            </button>
            <a href="{{ url_for('main.dashboard') }}" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-surface text-text border border-border font-medium rounded-xl hover:bg-surface-hover transition-colors shadow-sm sm:w-auto">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
function setToday() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
    clearDateLock(); // Clear lock if user explicitly selects Today
}

function setYesterday() {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    document.getElementById('date').value = yesterday.toISOString().split('T')[0];
    // Optional: Decide if setting yesterday should also lock it or just set it. 
    // For now, let's just set it. User can lock it if they want.
}

// --- Date Locking Feature ---

function lockDate() {
    const dateInput = document.getElementById('date');
    const dateValue = dateInput.value;
    if (dateValue) {
        localStorage.setItem('lockedDate', dateValue);
        updateLockUI(dateValue);
    }
}

function clearDateLock() {
    localStorage.removeItem('lockedDate');
    updateLockUI(null);
}

function updateLockUI(lockedDate) {
    const lockContainer = document.getElementById('locked-date-container');
    const lockBtn = document.getElementById('lock-date-btn');
    const dateInput = document.getElementById('date');

    if (lockedDate) {
        // Show locked state
        if (lockContainer) {
            lockContainer.style.display = 'inline-flex';
            lockContainer.className = 'inline-flex items-center gap-1 px-3 py-1.5 bg-primary/10 text-primary border border-primary/20 rounded-lg text-xs font-medium';
            lockContainer.innerHTML = `
                <i data-lucide="lock" class="w-3 h-3"></i> ${lockedDate} 
                <button type="button" class="ml-1 hover:text-primary-dark transition-colors" aria-label="Close" onclick="clearDateLock()">
                    <i data-lucide="x" class="w-3 h-3"></i>
                </button>
            `;
            lucide.createIcons();
        }
        if (lockBtn) lockBtn.style.display = 'none';
        
        // Ensure input matches locked date
        if (dateInput.value !== lockedDate) {
             dateInput.value = lockedDate;
        }
    } else {
        // Show unlock state
        if (lockContainer) lockContainer.style.display = 'none';
        if (lockBtn) lockBtn.style.display = 'inline-block';
    }
}

// Initialize on load
window.onload = function() {
    const lockedDate = localStorage.getItem('lockedDate');
    const dateInput = document.getElementById('date');
    
    if (lockedDate) {
        dateInput.value = lockedDate;
        updateLockUI(lockedDate);
    } else {
        if (!dateInput.value) {
            setToday();
        }
        updateLockUI(null);
    }

    // --- Transaction Type Toggle Logic ---
    const typeRadios = document.querySelectorAll('input[name="transaction_type"]');
    const categorySection = document.getElementById('category-section');
    const toWalletSection = document.getElementById('to-wallet-section');
    const walletLabel = document.getElementById('wallet-label');

    function updateFormVisibility() {
        const checkedInput = document.querySelector('input[name="transaction_type"]:checked');
        if (!checkedInput) return;

        const selectedType = checkedInput.value;
        if (selectedType === 'transfer') {
            if (categorySection) categorySection.style.display = 'none';
            if (toWalletSection) toWalletSection.style.display = 'block';
            if (walletLabel) walletLabel.textContent = 'From Wallet';
            
            // Safe null check for category radios
            const firstCategoryRadio = document.querySelector('input[name="category"]');
            if (firstCategoryRadio) {
                firstCategoryRadio.required = false;
            }
        } else {
            if (categorySection) categorySection.style.display = 'block';
            if (toWalletSection) toWalletSection.style.display = 'none';
            if (walletLabel) walletLabel.textContent = 'Wallet';
            
            const firstCategoryRadio = document.querySelector('input[name="category"]');
            if (firstCategoryRadio) {
                firstCategoryRadio.required = true;
            }
        }
    }

    typeRadios.forEach(radio => {
        radio.addEventListener('change', updateFormVisibility);
        // Also listen for clicks on the parent labels just in case
        const label = document.querySelector(`label[for="${radio.id}"]`);
        if (label) {
            label.addEventListener('click', () => {
                radio.checked = true;
                updateFormVisibility();
            });
        }
    });

    updateFormVisibility();
};
</script>
{% endblock %}
